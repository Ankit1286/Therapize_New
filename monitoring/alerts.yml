groups:
  - name: therapize_alerts
    rules:

      # P99 latency SLO: < 2 seconds
      - alert: HighSearchLatency
        expr: histogram_quantile(0.99, rate(therapize_search_latency_ms_bucket[5m])) > 2000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P99 search latency is above 2s"
          description: "Current P99: {{ $value }}ms"

      # Error rate SLO: < 1%
      - alert: HighErrorRate
        expr: >
          rate(therapize_search_requests_total{status="error"}[5m]) /
          rate(therapize_search_requests_total[5m]) > 0.01
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeds 1%"

      # Cache hit rate: if below 40%, something is wrong
      - alert: LowCacheHitRate
        expr: >
          rate(therapize_cache_hits_total[5m]) /
          (rate(therapize_cache_hits_total[5m]) + rate(therapize_cache_misses_total[5m]))
          < 0.4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below 40%"

      # No results being returned
      - alert: EmptyResults
        expr: >
          avg_over_time(therapize_candidates_after_filter_bucket{le="5"}[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "More than 50% of searches returning fewer than 5 candidates"
